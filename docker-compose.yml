services:
  db-customers:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_CUSTOMERS_NAME}
      POSTGRES_USER: ${DB_CUSTOMERS_USER}
      POSTGRES_PASSWORD: ${DB_CUSTOMERS_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - customers-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_CUSTOMERS_USER} -d ${DB_CUSTOMERS_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-accounts:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_ACCOUNTS_NAME}
      POSTGRES_USER: ${DB_ACCOUNTS_USER}
      POSTGRES_PASSWORD: ${DB_ACCOUNTS_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - accounts-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ACCOUNTS_USER} -d ${DB_ACCOUNTS_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  customers-service:
    build:
      context: ./customers-service
    ports:
      - "8080:8080"
    environment:
      DATASOURCE_URL: ${CUSTOMERS_DATASOURCE_URL}
      DATASOURCE_USERNAME: ${DB_CUSTOMERS_USER}
      DATASOURCE_PASSWORD: ${DB_CUSTOMERS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      db-customers:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  accounts-service:
    build:
      context: ./accounts-service
    ports:
      - "8081:8081"
    environment:
      DATASOURCE_URL: ${ACCOUNTS_DATASOURCE_URL}
      DATASOURCE_USERNAME: ${DB_ACCOUNTS_USER}
      DATASOURCE_PASSWORD: ${DB_ACCOUNTS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      db-accounts:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  customers-data:
  accounts-data:
